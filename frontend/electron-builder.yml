appId: com.findwords.app
productName: FindWords
copyright: Copyright © 2026 Chen Shengfeng

electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

directories:
  output: release

files:
  - electron/**/*
  - package.json
  - "!src/**"
  - "!public/**"
  - "!*.ts"
  - "!*.config.*"
  - "!tsconfig.json"

extraResources:
  # Bundled Python backend (one-dir mode: executable + _internal/)
  - from: ../backend/dist/findwords-server/
    to: backend
    filter:
      - "**/*"
  # Built frontend static files
  - from: dist/
    to: frontend-dist
    filter:
      - "**/*"
  # Window icon for runtime use on Windows
  - from: electron/icons/icon.ico
    to: icon.ico

mac:
  category: public.app-category.reference
  icon: electron/icons/icon.icns
  target:
    - dmg
    - zip

win:
  icon: electron/icons/icon.ico
  signAndEditExecutable: true
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: electron/icons/icon.ico
  uninstallerIcon: electron/icons/icon.ico
  installerHeaderIcon: electron/icons/icon.ico
  installerLanguages:
    - zh_CN
    - en_US

linux:
  icon: electron/icons/
  category: Education
  target:
    - AppImage
    - deb
